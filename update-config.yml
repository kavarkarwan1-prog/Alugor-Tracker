name: Update currency & commodity prices

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours - these change far less than stocks
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-config:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run config updater
        working-directory: backend
        run: node updateConfig.js

      - name: Commit and push updated config
        run: |
          git config user.name "isx-scraper-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/config.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update currency/commodity prices [skip ci]"
            git push
          fi
