name: iraqi_borsa_tracker
description: Read-only Iraqi stock price tracker, polling a static JSON feed on GitHub Pages.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Networking (polls the GitHub Pages JSON feed)
  http: ^1.2.1

  # State management
  provider: ^6.1.2

  # UI / charts / fonts
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  intl: ^0.19.0

  # Local persistence for favorites + theme preference
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
